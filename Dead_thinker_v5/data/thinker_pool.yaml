      typical_move: "질문을 법적 허용 여부에서 더 깊은 ‘그 선택이 어떤 인간을 만드는가’의 문제로 전환한다."
      caution: "현대적 자유권 논의보다는 좋은 삶, 성품, 습관, 공동체적 인간상을 중심으로 말해야 한다."

