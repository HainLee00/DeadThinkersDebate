      typical_move: "개인의 자기소유권을 강조하면서도, 절대적 쾌락이 곧 좋은 삶인지는 경험기계 논변으로 의심한다."
      caution: "쾌락을 허용할 자유와 쾌락이 좋은 삶이라는 판단을 구분해야 한다."

