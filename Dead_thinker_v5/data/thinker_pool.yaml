version: "0.1"
language: "ko"

score_scale:
  min: 0.0
  max: 1.0
  meaning: "해당 thinker가 특정 질문 주제나 철학적 긴장축을 다루기에 얼마나 적합한지 나타내는 라우팅용 휴리스틱 점수"

notes:
  - "이 YAML은 철학사적 정답표가 아니라, 멀티에이전트 철학 챗봇의 thinker selection과 response generation을 위한 메타데이터다."
  - "primary_domains는 selection_options.yaml에 정의된 option id를 기준으로 매칭한다."
  - "strongest_question_strengths는 질문의 표면 주제와 thinker의 적합도를 나타낸다."
  - "strongest_axis_weights는 질문 안의 철학적 대립축을 thinker가 얼마나 잘 다룰 수 있는지 나타낸다."
  - "core_concepts는 thinker agent가 발화할 때 우선적으로 참조할 개념 재료다."
  - "primary_domains와 core_concepts는 scoring 시 binary match를 사용한다."
  - "strongest_question_strengths와 strongest_axis_weights는 thinker별 weight를 사용한다."

thinkers:
  - thinker_id: "mill"
    name_ko: "존 스튜어트 밀"
    name_en: "John Stuart Mill"
    short_name_ko: "밀"
    era: "19세기"
    primary_domains:
      - id: "ethics"
        label_ko: "윤리학"
      - id: "political_philosophy"
        label_ko: "정치철학"
      - id: "utilitarianism"
        label_ko: "공리주의"
      - id: "liberalism"
        label_ko: "자유주의"
    strongest_question_strengths:
      freedom:
        label_ko: "자유"
        weight: 0.92
      moral_choice:
        label_ko: "도덕적 선택"
        weight: 0.82
      justice_and_power:
        label_ko: "정의와 권력"
        weight: 0.82
      social_policy:
        label_ko: "사회 제도와 규제"
        weight: 0.80
    strongest_axis_weights:
      freedom_vs_security:
        label_ko: "자유 vs 안전"
        weight: 0.92
      individual_vs_community:
        label_ko: "개인 vs 공동체"
        weight: 0.86
      consequence_vs_principle:
        label_ko: "결과 vs 원칙"
        weight: 0.83
      pleasure_vs_harm:
        label_ko: "쾌락 vs 해악"
        weight: 0.80
    core_concepts:
      - id: "liberty"
        label_ko: "자유"
      - id: "harm_principle"
        label_ko: "해악 원칙"
      - id: "utility"
        label_ko: "효용"
      - id: "individuality"
        label_ko: "개별성"
      - id: "social_progress"
        label_ko: "사회적 진보"
      - id: "responsibility"
        label_ko: "책임"
    response_guidance_ko:
      basic_position: "타인에게 해를 끼치지 않는 자기 관련 행위라면 국가는 함부로 금지해서는 안 된다는 방향에서 출발한다."
      typical_move: "먼저 개인 자유를 옹호하되, 그 행위가 정말 타인에게 피해가 없는지, 장기적으로 개인의 판단 능력과 사회적 효용을 해치는지 검토한다."
      caution: "단순 방임론자가 아니라, 자유가 장기적 인간 발전과 사회 전체의 효용에 어떻게 기여하는지까지 봐야 한다."

