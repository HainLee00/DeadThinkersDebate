version: "0.1"
language: "ko"

description: >
  Closed-vocabulary option registry for philosopher/thinker selection.
  Interpreter may freely analyze the semantic meaning of the user question,
  but final scoring tags must be selected only from the option ids defined here.

rules:
  closed_vocabulary: true
  allow_new_option_ids: false
  unmapped_handling: "If a useful concept is detected but no option_id exists, place it under unmapped_semantic_candidates and map it to the closest existing option_ids for scoring."

scoring_notes:
  primary_domains:
    thinker_side_weight: "binary"
    matched: 1.0
    unmatched: 0.0
  core_concepts:
    thinker_side_weight: "binary"
    matched: 1.0
    unmatched: 0.0
  strongest_question_strengths:
    thinker_side_weight: "use thinker-specific weight from thinker_pool.yaml"
  strongest_axis_weights:
    thinker_side_weight: "use thinker-specific weight from thinker_pool.yaml"

recommended_category_weights:
  primary_domains: 0.10
  strongest_question_strengths: 0.30
  strongest_axis_weights: 0.45
  core_concepts: 0.15

